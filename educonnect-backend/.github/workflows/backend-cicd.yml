name: backend-cicd

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: viraldobariya33/edu-backend

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    
    outputs:
      image_tag: ${{steps.tag-img.outputs.tag}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven
      
      - name: Build and run tests
        run: mvn clean verify

      - name: Sonarqube scan
        run: |
          mvn sonar:sonar \
          -Dsonar.projectKey=backend \
          -Dsonar.host.url=${{secrets.SONAR_HOST_URL}} \
          -Dsonar.login=${{secrets.SONAR_TOKEN}} \
          -Dsonar.qualitygate.wait=true

      # - name: OWASP dependency check
      #   run: mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7

      - name: Set image tag
        id: tag-img
        run: echo "tag=backend-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build docker image
        run: docker build -t $DOCKER_IMAGE:${{steps.tag-img.outputs.tag}} .

      # - name: Trivy scan (fail on HIGH/CRITICAL)
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: ${{env.DOCKER_IMAGE}}:${{steps.tag-img.outputs.tag}}
      #     severity: HIGH,CRITICAL
      #     exit-code: 1
      
      - name: Login to dockerhub
        run: echo "${{secrets.DOCKER_PASSWORD}}" | docker login -u ${{secrets.DOCKER_USERNAME}} --password-stdin

      - name: Push docker image
        run: docker push $DOCKER_IMAGE:${{steps.tag-img.outputs.tag}}
      

  update-gitops:
    runs-on: ubuntu-latest

    needs:
      - build-test-scan
    
    steps:
      - name: Clone repo
        run: git clone https://${{secrets.GITOPS_TOKEN}}@github.com/viraldobariya/educonnect-gitops.git

      - name: Install yq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O yq
          chmod +x yq
          sudo mv yq /usr/local/bin/

      - name: Update values.yaml
        run: |
          cd educonnect-gitops
          TAG=${{ needs.build-test-scan.outputs.image_tag }}
          yq e ".backend.image.tag = \"$TAG\"" -i charts/backend/values.yaml
      
      - name: Commit and Push Changes
        run: |
          cd educonnect-gitops
          TAG=${{ needs.build-test-scan.outputs.image_tag }}

          git config user.name "viral"
          git config user.email "viral@gmail.com"

          git diff --quiet && echo "No changes" || {
            git add charts/backend/values.yaml
            git commit -m "Update backend image to ${TAG}"
            git push
          }